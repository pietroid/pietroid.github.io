name: pietroid_github_io
description: Personal blog built with Jaspr
version: 0.0.1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  jaspr_flutter_embed: ^0.4.11
  jaspr_router: ^0.8.2
  flutter_svg: ^2.3.0
  flame: ^1.21.0

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.6.0
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
  flutter: embedded

flutter:
  uses-material-design: true
  assets:
    - assets/
